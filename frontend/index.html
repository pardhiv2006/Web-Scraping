<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizScraper Console</title>
    <link rel="stylesheet" href="styles.css?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="auth.js?v=3.0"></script>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = '/login.html'; }
    </script>
</head>
<body>
    <div class="app-container">
        
        <!-- Radical Navigation Paradigm: Integrated Left Console -->
        <aside class="sidebar" id="history-sidebar">
            <div class="brand-header">
                <div class="logo-lockup">
                    <i data-lucide="layers"></i>
                    <h1>BizScraper</h1>
                </div>
            </div>

            <div class="sidebar-top">
                <span class="sidebar-label">Query History</span>
                <button id="clear-history-btn" class="btn-icon-danger" title="Clear History">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
            
            <div id="history-list" class="history-list">
                <!-- Skeletons -->
                <div class="history-item-skeleton shimmer"></div>
                <div class="history-item-skeleton shimmer"></div>
                <div class="history-item-skeleton shimmer"></div>
            </div>

            <div class="user-profile" id="user-menu">
                <div class="user-meta">
                    <div class="user-avatar" id="nav-username-initial">
                        <i data-lucide="user" style="width:16px;height:16px;color:#a1a1aa;"></i>
                    </div>
                    <span id="nav-username">Admin</span>
                    <span class="user-role">N/A</span>
                </div>
                <button id="logout-btn" class="btn-logout" title="Log Out">
                    <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
                </button>
            </div>
        </aside>

        <!-- Main Operative Screen -->
        <main class="main-content">
            
            <div class="top-command-bar">
                <div class="command-title">Active Index Interface</div>
            </div>

            <!-- Wrapper for sticky behavior during scraping -->
            <div class="sticky-header-wrapper">
                <!-- Precision Controls Block -->
                <section class="controls-card">
                    <div class="card-grid">
                        <div class="control-group">
                            <label>Country</label>
                            <div class="multi-select-container" id="country-container">
                                <div id="country-select-trigger" class="select-trigger">
                                    <span id="country-select-label">Select</span>
                                    <i data-lucide="chevron-down" style="width:14px; height:14px;"></i>
                                </div>
                                <div id="country-options" class="options-dropdown hidden"></div>
                            </div>
                        </div>

                        <div class="control-group">
                            <label>States</label>
                            <div class="multi-select-container" id="state-container">
                                <div id="state-select-trigger" class="select-trigger">
                                    <span id="state-select-label">Select</span>
                                    <i data-lucide="chevron-down" style="width:14px; height:14px;"></i>
                                </div>
                                <div id="state-options" class="options-dropdown hidden"></div>
                            </div>
                            <div id="state-warning" class="validation-warning hidden">Country required</div>
                        </div>

                        <button id="start-scrape-btn" class="btn-primary" disabled>
                            <span class="btn-text">Start Scrape</span>
                            <div class="spinner hidden"></div>
                        </button>
                    </div>
                </section>

                <!-- Metrics -->
                <div class="stats-row hidden">
                    <div class="stat-card">
                        <div class="stat-icon"><i data-lucide="hash"></i></div>
                        <div class="stat-label">Total Index Count</div>
                        <div id="stat-total" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i data-lucide="layers"></i></div>
                        <div class="stat-label">Yield This Operations</div>
                        <div id="stat-recent" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i data-lucide="alert-circle"></i></div>
                        <div class="stat-label">Skipped Anomalies</div>
                        <div id="stat-skipped" class="stat-value">0</div>
                    </div>
                </div>
            </div>

            <!-- Data Array -->
            <section class="data-results-container hidden">
                
                <div class="results-header">
                    <div class="results-title"><h2>Nodes</h2></div>
                    <div class="results-actions">
                        <div class="search-input-wrapper">
                            <input type="text" id="table-search" placeholder="Search parameters...">
                            <i data-lucide="search" style="width: 14px; height: 14px;"></i>
                        </div>
                        <button id="refresh-btn" class="btn-refresh" title="Reload View">
                            <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>

                <!-- The magic happens here: JS will inject rows here, but our CSS enforces them as masonry cards -->
                <div class="data-view-wrapper">
                    <!-- Standard card-table header is removed via CSS to break the table illusion -->
                    <div class="card-table-header">
                        <div class="col-name">Name</div>
                        <div class="col-reg">Reg</div>
                        <div class="col-status">Status</div>
                        <div class="col-location">Loc</div>
                        <div class="col-contact">Contact</div>
                        <div class="col-actions"></div>
                    </div>
                    
                    <div id="business-list" class="card-row-container">
                        <div class="card-row-skeleton shimmer"></div>
                        <div class="card-row-skeleton shimmer"></div>
                        <div class="card-row-skeleton shimmer"></div>
                        <div class="card-row-skeleton shimmer"></div>
                    </div>

                    <div id="no-data" class="empty-state hidden">
                        <i data-lucide="database-zap" style="width: 48px; height: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                        <p>No entity data registered on standard output stream.</p>
                    </div>
                    
                    <div id="table-loading" class="table-overlay hidden">
                        <div class="spinner large"></div>
                    </div>
                </div>

                <div class="results-footer">
                    <div class="pagination">
                        <button id="prev-page" disabled><i data-lucide="arrow-left" style="width:14px; height:14px;"></i> Prev</button>
                        <button id="next-page" disabled>Next <i data-lucide="arrow-right" style="width:14px; height:14px;"></i></button>
                    </div>
                    <div id="page-info" style="display:none;"></div> <!-- Keep ID to avoid JS errors, but hide it to fit minimalist aesthetic -->
                    <button id="export-csv-btn" class="btn-export hidden">
                        <i data-lucide="download" style="width:14px; height:14px;"></i>
                        <span>Export</span>
                    </button>
                </div>

            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Confirm Action</h3>
                <button class="modal-close" id="modal-close-x"><i data-lucide="x" style="width: 16px; height: 16px;"></i></button>
            </div>
            <div class="modal-body">
                <p id="modal-message">Please confirm to proceed</p>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="modal-confirm-btn" class="btn-primary danger">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    
    <script src="app.js?v=3.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Set first letter in avatar if username is available
            setTimeout(() => {
                const uname = document.getElementById('nav-username').textContent;
                if(uname && uname !== 'Admin') {
                    document.getElementById('nav-username-initial').innerHTML = `<span style="font-size:12px; font-weight:600; color:var(--text-primary); text-transform:uppercase;">${uname.charAt(0)}</span>`;
                }
            }, 500);
        });
    </script>
</body>
</html>
