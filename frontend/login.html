<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizScraper AI | Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('bg.png');
            background-size: cover;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            margin: 20px;
            animation: fadeUp 0.6s ease;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .auth-tab.active {
            color: var(--primary);
            position: relative;
        }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-sub);
        }
        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .auth-btn {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-card glass radius-xl">
        <div class="auth-header">
            <div class="logo">
                <span class="icon">🔍</span>
                <h1>BizScraper <span>AI</span></h1>
            </div>
            <p class="subtitle">Secure workspace for data intelligence</p>
        </div>

        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active">Login</div>
            <div id="tab-register" class="auth-tab">Register</div>
        </div>

        <form id="auth-form">
            <div id="username-group" class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            
            <div id="email-group" class="form-group hidden">
                <label for="email">Email Address</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <div id="confirm-password-group" class="form-group hidden">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary auth-btn">
                <span class="btn-text">Sign In</span>
                <div class="spinner hidden" id="auth-spinner"></div>
            </button>
        </form>
    </div>

    <div id="toast-container"></div>

    <script src="auth.js"></script>
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const emailGroup = document.getElementById('email-group');
        const submitBtnText = document.querySelector('#submit-btn .btn-text');
        const authForm = document.getElementById('auth-form');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const authSpinner = document.getElementById('auth-spinner');

        let mode = 'login';

        tabLogin.addEventListener('click', () => {
            mode = 'login';
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            emailGroup.classList.add('hidden');
            confirmPasswordGroup.classList.add('hidden');
            emailInput.removeAttribute('required');
            confirmPasswordInput.removeAttribute('required');
            submitBtnText.textContent = 'Sign In';
        });

        tabRegister.addEventListener('click', () => {
            mode = 'register';
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            emailGroup.classList.remove('hidden');
            confirmPasswordGroup.classList.remove('hidden');
            emailInput.setAttribute('required', '');
            confirmPasswordInput.setAttribute('required', '');
            submitBtnText.textContent = 'Create Account';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value;
            const password = passwordInput.value;
            const email = emailInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (mode === 'register' && password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            authSpinner.classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;

            try {
                if (mode === 'login') {
                    const success = await Auth.login(username, password);
                    if (success) window.location.href = '/';
                } else {
                    const success = await Auth.register(username, email, password);
                    if (success) {
                        showToast('Registration successful! Please login.');
                        tabLogin.click();
                    }
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                authSpinner.classList.add('hidden');
                document.getElementById('submit-btn').disabled = false;
            }
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') toast.style.borderColor = 'var(--danger)';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Check if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
