<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizScraper System Auth</title>
    <link rel="stylesheet" href="styles.css?v=3.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-base);
            background-image: 
                radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, #f1f5f9 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, #e0e7ff 0%, transparent 50%);
            position: relative;
        }

        /* Ambient glowing orbs */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            z-index: 1;
            pointer-events: none;
            animation: orbFloat 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: 10%; right: 20%; animation-delay: -2s; }
        .orb-2 { width: 600px; height: 600px; background: #818cf8; bottom: -10%; left: 10%; animation-duration: 25s; }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Login Card */
        .auth-container {
            width: 100%;
            max-width: 460px;
            background: var(--bg-surface);
            padding: 56px;
            border-radius: 32px;
            border: 1px solid var(--border-dim);
            box-shadow: var(--shadow-xl);
            transition: all var(--transition);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -1px; left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .auth-container:hover {
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        /* Brand Header */
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-lockup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo-lockup i {
            color: var(--accent);
            width: 36px;
            height: 36px;
        }

        .logo-lockup h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header .subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            margin-bottom: 32px;
            background: var(--bg-panel);
            border-radius: var(--radius-md);
            padding: 4px;
            border: 1px solid var(--border-dim);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }

        .auth-tab:hover { color: var(--text-primary); }

        .auth-tab.active {
            color: var(--accent);
            background: var(--bg-surface);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-dim);
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group input {
            width: 100%;
            height: 52px;
            background: var(--bg-panel);
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            padding: 0 20px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all var(--transition-fast);
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: var(--bg-surface);
        }

        /* Submit Button */
        .btn-primary.auth-btn {
            width: 100%;
            margin-top: 32px;
            height: 56px;
            font-size: 16px;
            justify-content: center;
        }

    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo-lockup">
                <i data-lucide="layers"></i>
                <h1>BizScraper</h1>
            </div>
            <p class="subtitle">Secure authentication node</p>
        </div>

        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active">Log In</div>
            <div id="tab-register" class="auth-tab">Create Account</div>
        </div>

        <form id="auth-form">
            <div id="username-group" class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            
            <div id="email-group" class="form-group hidden">
                <label for="email">Email Address</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <div id="confirm-password-group" class="form-group hidden">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary auth-btn">
                <span class="btn-text">Authenticate</span>
                <div class="spinner hidden" id="auth-spinner"></div>
            </button>
        </form>
    </div>

    <div id="toast-container"></div>

    <script src="auth.js"></script>
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const emailGroup = document.getElementById('email-group');
        const submitBtnText = document.querySelector('#submit-btn .btn-text');
        const authForm = document.getElementById('auth-form');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const authSpinner = document.getElementById('auth-spinner');

        let mode = 'login';

        tabLogin.addEventListener('click', () => {
            mode = 'login';
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            emailGroup.classList.add('hidden');
            confirmPasswordGroup.classList.add('hidden');
            emailInput.removeAttribute('required');
            confirmPasswordInput.removeAttribute('required');
            submitBtnText.textContent = 'Authenticate';
        });

        tabRegister.addEventListener('click', () => {
            mode = 'register';
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            emailGroup.classList.remove('hidden');
            confirmPasswordGroup.classList.remove('hidden');
            emailInput.setAttribute('required', '');
            confirmPasswordInput.setAttribute('required', '');
            submitBtnText.textContent = 'Create Portal';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value;
            const password = passwordInput.value;
            const email = emailInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (mode === 'register' && password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            authSpinner.classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;

            try {
                if (mode === 'login') {
                    const success = await Auth.login(username, password);
                    if (success) window.location.href = '/';
                } else {
                    const success = await Auth.register(username, email, password);
                    if (success) {
                        showToast('Portal created successfully');
                        tabLogin.click();
                    }
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                authSpinner.classList.add('hidden');
                document.getElementById('submit-btn').disabled = false;
            }
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') {
                toast.style.borderLeftColor = 'var(--danger)';
            }
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px) translateX(20px)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        lucide.createIcons();
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
